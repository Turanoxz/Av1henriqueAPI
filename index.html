<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AniSearch — Catálogo de Animes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="container d-flex align-items-center justify-content-between py-3">
        <a href="index.html" class="logo">
          <span class="logo-jp">アニ</span>
          <span class="logo-en">AniSearch</span>
        </a>
        <div class="d-flex align-items-center gap-3">
          <a href="favoritos.html" class="header-fav-link">
            <i class="bi bi-heart-fill"></i> Favoritos
          </a>
          <p class="header-sub mb-0">Powered by <a href="https://jikan.moe" target="_blank">Jikan API</a></p>
        </div>
      </div>
    </header>

    <section class="hero-section">
      <div class="container text-center">
        <h1 class="hero-title">Encontre seu próximo anime</h1>
        <p class="hero-sub">Busque entre milhares de títulos do MyAnimeList</p>
        <div class="search-wrapper mx-auto mt-4">
          <div class="input-group">
            <input type="text" id="searchInput" class="form-control search-input"
              placeholder="Ex: Naruto, Attack on Titan, One Piece..." autocomplete="off"/>
            <button class="btn btn-search" id="searchBtn" type="button">
              <i class="bi bi-search"></i> Buscar
            </button>
          </div>
        </div>
      </div>
    </section>

    <section class="filters-section">
      <div class="container">
        <div class="filters-bar">
          <div class="filter-group">
            <label class="filter-label">Tipo</label>
            <select id="filterType" class="filter-select">
              <option value="">Todos</option>
              <option value="tv">TV</option>
              <option value="movie">Filme</option>
              <option value="ova">OVA</option>
              <option value="ona">ONA</option>
              <option value="special">Especial</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label">Status</label>
            <select id="filterStatus" class="filter-select">
              <option value="">Todos</option>
              <option value="airing">Em exibição</option>
              <option value="complete">Completo</option>
              <option value="upcoming">Em breve</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label">Gênero</label>
            <select id="filterGenre" class="filter-select">
              <option value="">Todos</option>
              <option value="1">Ação</option>
              <option value="2">Aventura</option>
              <option value="4">Comédia</option>
              <option value="8">Drama</option>
              <option value="10">Fantasia</option>
              <option value="14">Horror</option>
              <option value="7">Mistério</option>
              <option value="22">Romance</option>
              <option value="24">Sci-Fi</option>
              <option value="36">Slice of Life</option>
              <option value="30">Esportes</option>
              <option value="37">Sobrenatural</option>
              <option value="41">Suspense</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label">Ordenar por</label>
            <select id="filterOrder" class="filter-select">
              <option value="score">Nota</option>
              <option value="popularity">Popularidade</option>
              <option value="rank">Ranking</option>
              <option value="title">Título</option>
              <option value="start_date">Data</option>
            </select>
          </div>
          <button class="btn btn-filter-clear" id="clearFilters" type="button">
            <i class="bi bi-x-circle"></i> Limpar
          </button>
        </div>
      </div>
    </section>

    <main class="container py-5">

      <div id="loadingState" class="text-center py-5 d-none">
        <div class="spinner-custom mx-auto mb-3"></div>
        <p class="loading-text">Carregando animes...</p>
      </div>

      <div id="errorState" class="d-none">
        <div class="alert-custom text-center mx-auto">
          <i class="bi bi-exclamation-triangle-fill fs-2 mb-2 d-block"></i>
          <p id="errorMessage" class="mb-0">Algo deu errado. Tente novamente.</p>
        </div>
      </div>

      <div id="emptyState" class="text-center py-5 d-none">
        <i class="bi bi-emoji-frown fs-1 mb-3 d-block" style="color:var(--accent)"></i>
        <p class="empty-text">Nenhum anime encontrado.</p>
      </div>

      <div id="resultsSection" class="d-none">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h2 class="section-title mb-0" id="sectionTitle">Top Animes</h2>
          <span id="resultsCount" class="results-badge"></span>
        </div>
        <div id="animeGrid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3"></div>
      </div>

      <!-- Paginação -->
      <div id="paginationWrapper" class="pagination-wrapper d-none">
        <p id="paginationInfo" class="pagination-info"></p>
        <div id="paginationControls" class="pagination-controls"></div>
      </div>

    </main>

    <footer class="site-footer text-center py-4">
      <p class="mb-0">Dados por <a href="https://jikan.moe" target="_blank">Jikan API</a> &mdash; Projeto AV1 · DWB</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
