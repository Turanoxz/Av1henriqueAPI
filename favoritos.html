<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AniSearch — Meus Favoritos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="container d-flex align-items-center justify-content-between py-3">
        <a href="index.html" class="logo">
          <span class="logo-jp">アニ</span>
          <span class="logo-en">AniSearch</span>
        </a>
        <a href="index.html" class="btn-back">
          <i class="bi bi-arrow-left"></i> Voltar ao catálogo
        </a>
      </div>
    </header>

    <section class="hero-section" style="padding: 2.5rem 0 2rem;">
      <div class="container text-center">
        <h1 class="hero-title"><i class="bi bi-heart-fill" style="color:var(--accent);font-size:0.8em;"></i> Meus Favoritos</h1>
        <p class="hero-sub" id="favSubtitle">Seus animes salvos neste navegador</p>
      </div>
    </section>

    <main class="container py-4">

      <!-- Vazio -->
      <div id="emptyFav" class="text-center py-5 d-none">
        <i class="bi bi-heart fs-1 mb-3 d-block" style="color:var(--text-muted)"></i>
        <p class="empty-text">Você ainda não tem favoritos salvos.</p>
        <a href="index.html" class="btn btn-search mt-2 d-inline-block">Explorar animes</a>
      </div>

      <!-- Lista -->
      <div id="favSection" class="d-none">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <h2 class="section-title mb-0">Salvos</h2>
          <button id="btnLimparTudo" class="btn-limpar-tudo" type="button">
            <i class="bi bi-trash3"></i> Limpar tudo
          </button>
        </div>
        <div id="favGrid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3"></div>
      </div>

    </main>

    <!-- Modal de confirmação para limpar tudo -->
    <div id="modalConfirm" class="modal-overlay d-none">
      <div class="modal-box">
        <h3 class="modal-title">Limpar favoritos?</h3>
        <p class="modal-text">Todos os animes salvos serão removidos. Essa ação não pode ser desfeita.</p>
        <div class="d-flex gap-3 justify-content-center">
          <button id="modalCancelar" class="btn-modal-cancel" type="button">Cancelar</button>
          <button id="modalConfirmar" class="btn-modal-confirm" type="button">Limpar tudo</button>
        </div>
      </div>
    </div>

    <footer class="site-footer text-center py-4">
      <p class="mb-0">Dados por <a href="https://jikan.moe" target="_blank">Jikan API</a> &mdash; Projeto AV1 · DWB</p>
    </footer>

    <!-- Toast -->
    <div id="favToast" class="fav-toast">
      <span id="favToastMsg"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/favoritos.js"></script>
  </body>
</html>
